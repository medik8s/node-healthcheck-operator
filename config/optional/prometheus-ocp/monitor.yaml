
# Prometheus Monitor Service (Metrics)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: controller-manager
  name: controller-manager-metrics-monitor
  namespace: system
spec:
  scrapeClass: tls-client-certificate-auth
  endpoints:
  - interval: 15s
    port: https
    scheme: https
    tlsConfig:
      ca:
        configMap:
          name: node-healthcheck-ca-bundle
          key: service-ca.crt
      # Namespace is hardcoded - update manually if namespace changes
      serverName: node-healthcheck-controller-manager-metrics-service.openshift-workload-availability.svc
  selector:
    matchLabels:
      app.kubernetes.io/component: controller-manager
      app.kubernetes.io/name: node-healthcheck-operator
      app.kubernetes.io/instance: metrics
