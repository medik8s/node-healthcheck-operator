# ClusterRoleBinding for MetricsClientCA controller ConfigMap access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: manager-configmap-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: manager-configmap-role
subjects:
- kind: ServiceAccount
  name: controller-manager
  namespace: system
