# ClusterRole for MetricsClientCA controller to manage ConfigMaps
# Used to sync the client CA for Platform Prometheus TLS authentication
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-configmap-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
