# This patch configures the manager to serve metrics directly on port 8443
# with authentication and authorization via controller-runtime's FilterProvider.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--health-probe-bind-address=:8081"
        - "--metrics-bind-address=0.0.0.0:8443"
        - "--leader-elect"
        - "--enable-http2=false"
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
