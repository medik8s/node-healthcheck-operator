apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: kube-rbac-proxy
        $patch: delete
      - name: manager
        args:
        - "--health-probe-bind-address=:8081"
        - "--metrics-bind-address=0.0.0.0:8443"
        - "--leader-elect"
        - "--enable-http2=false"
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        volumeMounts:
        - name: tls-config
          mountPath: /etc/tls/private
          readOnly: true
      volumes:
      - name: tls-config
        secret:
          secretName: node-healthcheck-tls
